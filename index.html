<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netslots · Home</title>
    <!-- Bebas Neue & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            padding: 1.5rem;
            position: relative;
        }

        /* Red ambient lighting — subtle glow across the background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 25% 30%, rgba(200, 0, 0, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 75% 60%, rgba(180, 0, 20, 0.04) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .home {
            position: relative;
            z-index: 2;
            max-width: 860px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.8rem;
        }

        /* Image wrapper with red lighting effect */
        .image-wrapper {
            position: relative;
            display: inline-block;
            filter: drop-shadow(0 0 12px rgba(200, 20, 30, 0.35));
            transition: filter 0.4s ease;
            animation: redPulse 3.5s infinite ease-in-out;
        }

        .image-wrapper:hover {
            filter: drop-shadow(0 0 25px rgba(255, 30, 50, 0.7)) drop-shadow(0 0 8px #ff2020);
            animation: none;
        }

        /* Red pulse animation for the logo lighting */
        @keyframes redPulse {
            0% { 
                filter: drop-shadow(0 0 8px rgba(200, 0, 20, 0.3)) drop-shadow(0 0 3px #ff4040); 
            }
            50% { 
                filter: drop-shadow(0 0 20px rgba(230, 20, 40, 0.6)) drop-shadow(0 0 8px #ff6060); 
            }
            100% { 
                filter: drop-shadow(0 0 8px rgba(200, 0, 20, 0.3)) drop-shadow(0 0 3px #ff4040); 
            }
        }

        /* Red glow outline around image on hover */
        .image-wrapper::after {
            content: '';
            position: absolute;
            inset: -5px;
            border: 2px solid rgba(210, 30, 50, 0.25);
            border-radius: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s;
            box-shadow: 0 0 20px #c01020;
        }

        .image-wrapper:hover::after {
            opacity: 0.9;
        }

        /* Image — exactly 500px × 281px */
        .brand-image {
            display: block;
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 500 / 281;
            border-radius: 0;
            border: 1px solid rgba(200, 30, 40, 0.2);
            box-shadow: 
                0 0 0 1px rgba(180, 0, 20, 0.15), 
                0 15px 35px -10px #000000;
            transition: border 0.25s, box-shadow 0.3s;
        }

        .brand-image:hover {
            border-color: #c41e3a;
            box-shadow: 
                0 0 0 2px rgba(220, 30, 50, 0.3), 
                0 20px 40px -8px #2a0000;
        }

        /* Navigation links — red text only, no buttons */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2.5rem 3.5rem;
        }

        .nav-link {
            font-family: 'Bebas Neue', sans-serif;
            font-weight: 400;
            font-size: 2.4rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #cc1111;
            text-decoration: none;
            position: relative;
            transition: all 0.25s ease;
            cursor: pointer;
            padding: 0.2rem 0;
        }

        /* Red underline hover effect */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #cc1111;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .nav-link:hover {
            color: #ff3333;
            text-shadow: 0 0 8px rgba(255, 50, 50, 0.5);
            letter-spacing: 4px;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .nav-link:active {
            color: #aa0000;
            transform: translateY(1px);
            transition: all 0.05s;
        }

        .nav-link:focus-visible {
            outline: 2px solid #cc1111;
            outline-offset: 6px;
        }

        /* Subtle red decorative line below image */
        .home::after {
            content: '';
            display: block;
            width: 160px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #cc1111, #ff4444, #cc1111, transparent);
            margin-top: -0.5rem;
            filter: blur(1.5px);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .nav-links {
                gap: 1.8rem 2.2rem;
            }
            .nav-link {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .home {
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <main class="home">
        <!-- Image wrapper with red lighting effect -->
        <div class="image-wrapper">
            <img 
                src="image.png" 
                alt="Netslots branding" 
                class="brand-image"
                width="500" 
                height="281"
            >
        </div>

        <!-- Three red text links — no buttons -->
        <div class="nav-links">
            <a class="nav-link" href="terms.html">Terms and conditions</a>
            <a class="nav-link" href="pricing.html">Pricing</a>
            <a class="nav-link" href="about.html">About us</a>
        </div>
    </main>
</body>
</html>
